<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in · PM Dashboard</title>
<link rel="icon" href="assets/logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="login-shell">
  <div class="login-card">
    <div class="login-brand">
      <img src="assets/logo.svg" alt="logo" />
      <span>PM Dashboard</span>
    </div>

    <div class="auth-tabs" role="tablist" aria-label="Authentication modes">
      <button type="button" class="auth-tab active" id="show-register-btn">Register</button>
      <button type="button" class="auth-tab" id="show-signin-btn">Sign in</button>
    </div>

    <h1 id="auth-title">Create your account</h1>
    <p id="auth-copy">Register first, then sign in.</p>

    <div id="login-error" class="login-error"></div>
    <div id="login-success" class="login-success"></div>

    <form id="register-form" class="auth-form" novalidate autocomplete="off">
      <div class="field-group">
        <label for="name">Display name</label>
        <input type="text" id="name" autocomplete="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="off" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>

    <form id="signin-form" class="auth-form hidden" novalidate autocomplete="off">
      <div class="field-group">
        <label for="signin-email">Email</label>
        <input type="email" id="signin-email" required autocomplete="off" autocapitalize="off" spellcheck="false" />
      </div>
      <div class="field-group">
        <label for="signin-password">Password</label>
        <input type="password" id="signin-password" required autocomplete="off" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <div class="login-hint" id="auth-hint">
      Register first, then sign in.
    </div>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
