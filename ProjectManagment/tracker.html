<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project Progress · PM Dashboard</title>
<link rel="icon" href="assets/logo.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<div class="app-shell">

  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar__brand">
      <img src="assets/logo.svg" alt="logo" />
      <span>PM Dashboard</span>
    </div>

    <nav class="sidebar__nav">
      <a href="dashboard.html" class="sidebar__link"><span class="icon"><i class="fa-solid fa-house"></i></span> Dashboard</a>
      <a href="kanban.html" class="sidebar__link"><span class="icon"><i class="fa-solid fa-table-columns"></i></span> Task Board</a>
      <a href="team.html" class="sidebar__link"><span class="icon"><i class="fa-solid fa-people-group"></i></span> Teams &amp; Projects</a>
      <a href="tracker.html" class="sidebar__link active"><span class="icon"><i class="fa-solid fa-chart-line"></i></span> Project Progress</a>
    </nav>

    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="sidebar-avatar">--</div>
        <div>
          <div class="sidebar__user-name" id="sidebar-user-name">—</div>
          <div class="sidebar__user-role" id="sidebar-user-role">—</div>
        </div>
      </div>
      <button class="btn-logout" id="logout-btn">Log out</button>
    </div>
  </aside>

  <!-- ============ MAIN CONTENT ============ -->
  <main class="main">
    <div class="topbar">
      <div>
        <h1>Project progress</h1>
        <p>Track each project's completion based on finished tasks.</p>
      </div>
    </div>

    <div id="tracker-list"></div>
  </main>
</div>

<script src="js/storage.js"></script>
<script src="js/layout.js"></script>
<script src="js/tracker.js"></script>
</body>
</html>
